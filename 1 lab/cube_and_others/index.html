<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Подключаем библиотеку gl-matrix через CDN -->

    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            margin-top: 100px;
            flex-direction: column;
        }
        canvas {
            border: 6px blue solid;
            display: block;
        }
        label{
            font-size: 20px;
        }
        select{
            font-size: 15px;
            margin-bottom: 20px;
        }
        option{
            font-size: 15px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <label for="figure"><b>Выберите тип:</b></label>
    <select id="typeSelector" name="figure">
        <option value="gl.POINTS">gl.POINTS</option>
        <option value="gl.LINES">gl.LINES</option>
        <option value="gl.LINE_STRIP">gl.LINE_STRIP</option>
        <option value="gl.LINE_LOOP">gl.LINE_LOOP</option>
        <option value="gl_polygon">gl_polygon</option>
        <option value="gl_quads">gl_quads</option>
        <option value="gl_quad_strip">gl.quad_strip</option>
        <option value="gl.TRIANGLES" selected>gl.TRIANGLES</option>
        <option value="gl.TRIANGLE_STRIP">gl.TRIANGLE_STRIP</option>
        <option value="gl.TRIANGLE_FAN">gl.TRIANGLE_FAN</option>
    </select>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <script src="script.js"></script>
</body>
</html>
