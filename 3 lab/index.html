<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    canvas {
        display: block;
    }
    .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .control-group {
        margin-bottom: 10px;
    }
    .all {
        display: flex;
        align-items: center;
        justify-content: space-around;
    }
    .coefs {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
    }
</style>
</head>
<body style="display: flex; align-items: center; flex-direction: column;">
    <div class = "all">
        <div class="controls">
            <div class="control-group">
                <label for="pointLightX">Point Light X:</label>
                <input type="range" id="pointLightX" min="-300" max="300" value="0">
            </div>
            <div class="control-group">
                <label for="pointLightY">Point Light Y:</label>
                <input type="range" id="pointLightY" min="-300" max="300" value="0">
            </div>
            <div class="control-group">
                <label for="pointLightZ">Point Light Z:</label>
                <input type="range" id="pointLightZ" min="-300" max="300" value="10">
            </div>
            <br>
            <div class="control-group">
                <label for="ambientCoeff">AmbientCoeff:</label>
                <input type="range" id="ambientCoeff" min="0" max="1" value="0.01" step="0.01">
            </div>
            <h3>Коэффициенты затухания: </h3>
            <div class="coefs">
                <div class="control-group">
                    <label for="k0">k0(Свободный коэф.):</label>
                    <input type="range" id="k0" min="0" max="1" value="1" step="0.01">
                </div>
                <div class="control-group">
                    <label for="k1">k1(Линейный коэф.):</label>
                    <input type="range" id="k1" min="0" max="0.1" value="0" step="0.01">
                </div>
                <div class="control-group">
                    <label for="k2">k2(Квадратичный коэф.):</label>
                    <input type="range" id="k2" min="0" max="0.015" value="0" step="0.001">
                </div>
            </div>
        </div>
        <div>
            <canvas id="glCanvas" width="800" height="600"></canvas>
        </div>
        <div class = "controls">
            <label for="figure"><b>Выберите фигуру:</b></label>
            <select id="figure" name="figure">
                <option value="snowman" selected>Снеговик</option>
                <option value="gun">Пистолет</option>
                <option value="balloon">Шарик</option>
                <option value="carpet">Пол</option>
            </select>
            <label for="shading"><b>Выберите шейдинг:</b></label>
            <select id="shading" name="shading">
                <option value="phong" selected>Phong</option>
                <option value="gouraud">Gouraud</option>
            </select>
            <label for="lighting"><b>Выберите освещение:</b></label>
            <select id="lighting" name="lighting">
                <option value="phong" selected>Phong</option>
                <option value="lambert">Lambert</option>
            </select>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <script src="script.js"></script>
</body>
</html>
